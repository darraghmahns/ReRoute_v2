name: CI and Deploy to Cloud Run

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  PROJECT_ID: reroute-training
  SERVICE_NAME: reroute-app
  REGION: us-central1

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - uses: actions/setup-node@v4
      with:
        node-version: 20
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json
    
    - name: Install & build frontend
      run: |
        cd frontend
        npm ci
        npm run lint
        npm run typecheck
        npm run format:check
        npm run build
    
    - uses: actions/setup-python@v5
      with:
        python-version: 3.11
    
    - name: Install backend dependencies
      run: |
        cd backend
        pip install -r requirements.txt
    
    - name: Run backend unit tests
      run: |
        cd backend
        python -m pytest tests/ -v || echo "No tests found, continuing..."

  deploy:
    if: github.ref == 'refs/heads/main'
    needs: build-and-test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - id: 'auth'
      uses: 'google-github-actions/auth@v2'
      with:
        credentials_json: '${{ secrets.GCP_SA_KEY }}'
    
    - name: 'Set up Cloud SDK'
      uses: 'google-github-actions/setup-gcloud@v2'
    
    - name: Build and deploy
      run: |
        cd backend
        gcloud builds submit --tag gcr.io/$PROJECT_ID/$SERVICE_NAME
        gcloud run deploy $SERVICE_NAME \
          --image gcr.io/$PROJECT_ID/$SERVICE_NAME \
          --platform managed \
          --region $REGION \
          --allow-unauthenticated \
          --memory 1Gi \
          --cpu 1 \
          --max-instances 10 \
          --port 8080 \
          --timeout 300 \
          --set-env-vars STRAVA_CLIENT_ID=162622 \
          --set-secrets OPENAI_API_KEY=OPENAI_API_KEY:latest,SECRET_KEY=SECRET_KEY:latest,STRAVA_CLIENT_SECRET=STRAVA_CLIENT_SECRET:latest \
          --add-cloudsql-instances reroute-training:us-central1:reroute-db