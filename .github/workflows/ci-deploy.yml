name: CI and Deploy to Cloud Run

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  SERVICE_NAME: reroute-app
  REGION: ${{ secrets.GCP_REGION }}

jobs:
  # Backend and frontend test job
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # Set up Node and build frontend
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install & build frontend
        run: |
          cd frontend
          npm ci
          npm run lint
          npm run typecheck
          npm run format:check
          npm run build

      # Set up Python and run backend tests
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install backend dependencies
        run: |
          cd backend
          pip install -r requirements.txt
      - name: Run backend unit tests
        env:
          USE_SQLITE: true
          TESTING: true
          OPENAI_API_KEY: "test"
          STRAVA_CLIENT_ID: "test"
          STRAVA_CLIENT_SECRET: "test"
          MAPBOX_API_KEY: "test"
          GRAPHHOPPER_API_KEY: "test"
        run: |
          cd backend
          pytest tests/ -m "not integration"

  # Deployment job, runs only if tests pass and push to main
  deploy:
    needs: build-and-test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Build frontend
        run: |
          cd frontend
          npm ci
          npm run build
      - name: Copy frontend to backend
        run: |
          mkdir -p backend/static
          cp -r frontend/dist/* backend/static/

      # Authenticate to GCP
      - uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}
      - uses: google-github-actions/setup-gcloud@v2

      # Build and push Docker image
      - name: Build & push Docker image
        run: |
          docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }} .
          docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:${{ github.sha }}

      # Deploy to Cloud Run
      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: ${{ env.SERVICE_NAME }}
          region: ${{ env.REGION }}
          image: gcr.io/${{ env.PROJECT_ID }}/${{ env.SERVICE_NAME }}:${{ github.sha }}
          env_vars: |
            USE_SQLITE=true
            ENVIRONMENT=production
          flags: |
            --allow-unauthenticated
            --memory=512Mi
            --cpu=1
            --timeout=300
            --max-instances=10
            --concurrency=80
            --port=8000
