name: Deploy with Terraform

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  PROJECT_ID: reroute-training
  SERVICE_NAME: reroute-app
  REGION: us-central1
  TF_VERSION: 1.6.0

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Setup Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.11'

    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm ci

    - name: Install Backend Dependencies
      run: |
        cd backend
        pip install -r requirements.txt || pip install fastapi uvicorn sqlalchemy alembic psycopg2-binary pydantic pydantic-settings python-multipart email-validator requests openai geopy numpy python-jose passlib bcrypt celery redis

    - name: Run Frontend Tests
      run: |
        cd frontend
        npm run typecheck || echo "No typecheck script found"

    - name: Run Backend Tests
      run: |
        cd backend
        python -m pytest tests/ || echo "No tests found"

  deploy:
    needs: test
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
        cache-dependency-path: frontend/package-lock.json

    - name: Build Frontend
      run: |
        cd frontend
        npm ci
        npm run build

    - name: Copy Frontend to Backend
      run: |
        mkdir -p backend/static
        cp -r frontend/dist/* backend/static/

    - name: Authenticate to Google Cloud
      uses: google-github-actions/auth@v2
      with:
        credentials_json: ${{ secrets.GCP_SA_KEY }}

    - name: Set up Cloud SDK
      uses: google-github-actions/setup-gcloud@v2

    - name: Configure Docker to use gcloud as a credential helper
      run: gcloud auth configure-docker

    - name: Build and Push Docker Image
      run: |
        docker build -t gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA .
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA
        docker tag gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA gcr.io/$PROJECT_ID/$SERVICE_NAME:latest
        docker push gcr.io/$PROJECT_ID/$SERVICE_NAME:latest

    - name: Setup Terraform
      uses: hashicorp/setup-terraform@v3
      with:
        terraform_version: ${{ env.TF_VERSION }}

    - name: Terraform Init
      run: |
        cd terraform
        terraform init

    - name: Terraform Plan
      run: |
        cd terraform
        terraform plan -var="db_password=${{ secrets.DB_PASSWORD }}"

    - name: Terraform Apply
      run: |
        cd terraform
        terraform apply -auto-approve -var="db_password=${{ secrets.DB_PASSWORD }}"

    - name: Get Service URL
      run: |
        cd terraform
        echo "SERVICE_URL=$(terraform output -raw service_url)" >> $GITHUB_ENV

    - name: Update Service with Latest Image
      run: |
        gcloud run services update $SERVICE_NAME \
          --region=$REGION \
          --image=gcr.io/$PROJECT_ID/$SERVICE_NAME:$GITHUB_SHA

    - name: Show Output
      run: |
        echo "Service deployed at: $SERVICE_URL"