repos:
  - repo: local
    hooks:
      - id: frontend-typecheck
        name: Frontend TypeScript Check
        entry: bash -c 'cd frontend && npm run typecheck'
        language: system
        files: '^frontend/.*\.(ts|tsx)$'
        
      - id: backend-black
        name: Backend Black Formatter
        entry: python -m black
        language: system
        files: '^backend/.*\.py$'
        
      - id: backend-black-check
        name: Backend Black Check
        entry: python -m black --check
        language: system
        files: '^backend/.*\.py$'